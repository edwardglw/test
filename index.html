<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>el-w — anima</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="side-nav" id="side-nav" aria-label="Site navigation">
      <div class="nav-inner">
        <div class="brand" aria-label="EL-W">el-w</div>
        <div class="project-name">anima</div>

        <label class="upload-mini" id="upload-mini" title="Upload a photo to generate a new visual page">
          <input type="file" id="vision-input" accept="image/*" />
          <div class="upload-mini-inner">
            <span class="upload-mini-plus">+</span>
            <span class="upload-mini-text" id="upload-mini-text">upload image</span>
          </div>
        </label>

        <!-- Vision pages appear here, directly below the upload zone -->
        <ul class="nav-list nav-vision-list" id="nav-vision-list" role="list"></ul>

        <ul class="nav-list" id="nav-list" role="list">
          <li class="nav-item">
            <button class="nav-link is-active" data-page="0" aria-current="page">Map</button>
            <button class="refresh-btn" data-page="0" aria-label="Refresh map">↻</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-page="1" aria-current="false">Forms</button>
            <button class="refresh-btn" data-page="1" aria-label="Refresh forms">↻</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-page="2" aria-current="false">Flux</button>
            <button class="refresh-btn" data-page="2" aria-label="Refresh flux">↻</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-page="3" aria-current="false">Strata</button>
            <button class="refresh-btn" data-page="3" aria-label="Refresh strata">↻</button>
          </li>
        </ul>

        <div class="nav-footer">
          <div class="coord-display" id="coord-display" aria-live="polite"></div>
        </div>
      </div>
    </nav>

    <main class="stage" id="stage" aria-label="Interactive visualisation">
      <canvas id="canvas"></canvas>
    </main>


    <script src="./app.js"></script>
  </body>
</html>
